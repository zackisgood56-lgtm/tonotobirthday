<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Para el Rey de los Corazones</title>
<style>
:root {
    --bg-color: #020205;
    --cobalt-primary: #0047AB;
    --cobalt-glow: #1e90ff;
    --relic-metal: #121218;
    --relic-accent: #1e2a3a;
    --text-main: #f0f0f5;
    --text-accent: #d1c7bd;
    --gold-light: #f5e0ac;
    --transition-speed: 0.8s;
    --font-display: 'Playfair Display', serif;
    --font-ui: 'Space Grotesk', sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg-color);overflow:hidden;font-family:var(--font-ui);height:100vh;display:flex;justify-content:center;align-items:center;position:relative;touch-action:none;}

/* Canvas de fondo */
#bg-canvas{position:absolute;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none;}

/* Música */
#music-btn{position:fixed;top:20px;right:20px;z-index:100;background:rgba(0,71,171,0.2);backdrop-filter:blur(8px);border:1px solid var(--cobalt-glow);padding:10px 20px;border-radius:30px;color:white;font-family:var(--font-ui);font-size:0.9rem;display:flex;align-items:center;gap:10px;box-shadow:0 5px 20px rgba(0,112,255,0.15);transition:all 0.3s;}
#music-btn:hover{background:rgba(0,112,255,0.4);box-shadow:0 10px 30px rgba(0,112,255,0.3);}

/* Juego */
#game-container{width:90%;max-width:800px;height:200px;background:linear-gradient(#020205,#0a0a10);overflow:hidden;border:2px solid var(--cobalt-primary);border-radius:12px;position:relative;z-index:5;}
#score{position:absolute;top:10px;right:20px;color:white;font-family:var(--font-ui);font-size:1.2rem;z-index:10;}

/* Relicario */
#relic-scene{width:90%;max-width:450px;height:350px;position:relative;transform-style:preserve-3d;transition:transform var(--transition-speed);z-index:10;display:none;}
#relic-scene.open {display:block;}
.relic-wrapper{width:100%;height:100%;position:absolute;transform-style:preserve-3d;transform-origin:center;animation:slowSpin 30s linear infinite;}
.relic-front{width:100%;height:100%;position:absolute;background-color:var(--relic-metal);border-radius:12px;box-shadow:0 30px 90px rgba(0,0,0,0.9);display:flex;overflow:hidden;z-index:5;}
.relic-door{width:50%;height:100%;position:absolute;top:0;background-color:var(--relic-accent);border:1px solid rgba(255,255,255,0.05);transform-style:preserve-3d;transition:transform var(--transition-speed) cubic-bezier(0.6,-0.28,0.735,0.045),z-index var(--transition-speed);}
.relic-door.left{left:0;border-radius:12px 0 0 12px;transform-origin:right;border-right:2px solid var(--cobalt-primary);}
.relic-door.right{right:0;border-radius:0 12px 12px 0;transform-origin:left;border-left:2px solid var(--cobalt-primary);}
#relic-scene.open .relic-door.left{transform:rotateY(-110deg) translateX(-10px);z-index:1;}
#relic-scene.open .relic-door.right{transform:rotateY(110deg) translateX(10px);z-index:1;}
.symbol-overlay{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%) translateZ(20px);font-size:3rem;color:var(--gold-light);text-shadow:0 0 15px var(--gold-light),0 0 30px var(--cobalt-glow);z-index:10;pointer-events:none;transition:opacity 0.5s;}
#relic-scene.open .symbol-overlay{opacity:0;}
.relic-back{width:100%;height:100%;position:absolute;top:0;left:0;background-color:var(--bg-color);border-radius:12px;border:2px solid var(--cobalt-primary);box-shadow:inset 0 0 50px rgba(0,112,255,0.15);z-index:1;padding:40px;transform:translateZ(-10px);overflow-y:auto;opacity:0;transition:opacity 0.5s var(--transition-speed);}
#relic-scene.open .relic-back{opacity:1;}
.relic-content{font-family:var(--font-display);font-size:1.15rem;line-height:1.9;color:var(--text-accent);text-align:justify;opacity:0;transform:translateY(20px);transition:opacity 1s 1s,transform 1s 1s;}
#relic-scene.open .relic-content{opacity:1;transform:translateY(0);}
.relic-content p{margin-bottom:20px;opacity:0;animation:fadeInText 1s forwards;}
.relic-content p:nth-child(1){animation-delay:1.2s;}
.relic-content p:nth-child(2){animation-delay:1.8s;}
.relic-footer{margin-top:30px;text-align:center;font-size:2rem;color:var(--text-main);opacity:0;animation:fadeInText 1s forwards;animation-delay:2.5s;}

/* Ocultar cursor solo en PC */
@media (pointer: fine) {
    body, #game-container, .relic-front, #music-btn { cursor: none; }
}

@keyframes fadeInText{to{opacity:1;}}
@keyframes slowSpin{0%{transform:rotateY(0deg);}100%{transform:rotateY(360deg);}}
</style>
</head>
<body>

<canvas id="bg-canvas"></canvas>

<button id="music-btn" onclick="toggleAudio(event)"><span id="audio-icon">▶</span> <span id="audio-text">Reproducir</span></button>
<audio id="mysong" src="mysong.mp3" loop></audio>

<div id="game-container">
    <canvas id="game-canvas"></canvas>
    <div id="score">0</div>
</div>

<div id="relic-scene">
    <div class="relic-wrapper">
        <div class="relic-front" onclick="openRelic()">
            <div class="symbol-overlay">👑</div>
            <div class="relic-door left"></div>
            <div class="relic-door right"></div>
        </div>
        <div class="relic-back">
            <div class="relic-content">
                <p>Hace tiempo una bolita amarilla pachona entró a la vida de una bolita café...</p>
                <p>Actualmente esas dos bolitas están juntas, son lo mejor de los dos mundos...</p>
            </div>
            <div class="relic-footer">💛🤎</div>
        </div>
    </div>
</div>

<script>
// Música
function toggleAudio(e){
    if(e) e.stopPropagation(); // Evita que activar la música afecte al juego
    const audio = document.getElementById('mysong');
    const icon = document.getElementById('audio-icon');
    const text = document.getElementById('audio-text');
    if(audio.paused){
        audio.play().catch(() => {
            console.log("Interacción requerida para reproducir audio");
        });
        icon.innerText = "⏸";
        text.innerText = "Pausar";
    } else {
        audio.pause();
        icon.innerText = "▶";
        text.innerText = "Reproducir";
    }
}

// --- Fondo de partículas ---
const canvasBg = document.getElementById('bg-canvas');
const ctxBg = canvasBg.getContext('2d');
function resizeBg(){canvasBg.width=window.innerWidth;canvasBg.height=window.innerHeight;}
window.addEventListener('resize',resizeBg);
resizeBg();
let particles=[];
let mouseX=canvasBg.width/2, mouseY=canvasBg.height/2;

// Eventos de movimiento (PC y Touch)
document.addEventListener('mousemove',e=>{mouseX=e.clientX;mouseY=e.clientY;});
document.addEventListener('touchmove',e=>{
    if(e.touches.length > 0){
        mouseX=e.touches[0].clientX;
        mouseY=e.touches[0].clientY;
    }
}, {passive: true});

class Particle{
    constructor(){
        this.x=mouseX;
        this.y=mouseY;
        this.size=Math.random()*4+1;
        this.color=Math.random()>0.3?'#1e90ff':'#ffffff';
        this.speedX=Math.random()*6-3;
        this.speedY=Math.random()*-8-2;
        this.opacity=1;
        this.decay=Math.random()*0.02+0.01;
    }
    update(){
        this.x+=this.speedX;
        this.y+=this.speedY;
        this.speedY+=0.1;
        this.size*=0.98;
        this.opacity-=this.decay;
    }
    draw(){
        ctxBg.save();
        ctxBg.globalAlpha=this.opacity;
        ctxBg.beginPath();
        ctxBg.arc(this.x,this.y,this.size,0,Math.PI*2);
        ctxBg.fillStyle=this.color;
        ctxBg.shadowBlur=15;
        ctxBg.shadowColor=this.color;
        ctxBg.fill();
        ctxBg.restore();
    }
}
function loopBg(){
    ctxBg.fillStyle='rgba(2,2,5,0.15)';
    ctxBg.fillRect(0,0,canvasBg.width,canvasBg.height);
    if(particles.length<60) particles.push(new Particle());
    for(let i=particles.length-1;i>=0;i--){
        particles[i].update();
        particles[i].draw();
        if(particles[i].opacity<=0||particles[i].size<=0.1) particles.splice(i,1);
    }
    requestAnimationFrame(loopBg);
}
loopBg();

// --- Mini-juego Dino Focas ---
const gameCanvas=document.getElementById('game-canvas');
const gctx=gameCanvas.getContext('2d');
function resizeGame(){
    gameCanvas.width=document.getElementById('game-container').clientWidth;
    gameCanvas.height=document.getElementById('game-container').clientHeight;
}
window.addEventListener('resize',resizeGame);
resizeGame();

// Focas
let focaYellow={x:50,y:gameCanvas.height-32,width:32,height:32,vy:0,jumping:false,color:'#FFD700'};
let focaBrown={x:100,y:gameCanvas.height-32,width:32,height:32,vy:0,jumping:false,color:'#8B4513'};

let obstacles=[];
let score=0;
let gameOver=false;
let gameStarted=false;

// Función para hacer saltar a las focas
function jump() {
    if(!gameStarted) {
        gameStarted = true;
        gameLoop();
        return;
    }
    [focaYellow,focaBrown].forEach(f=>{
        if(!f.jumping){f.vy=-8;f.jumping=true;}
    });
}

// Controles de salto (Teclado y Touch)
document.addEventListener('keydown',e=>{
    if(e.code==='Space'||e.code==='ArrowUp'){
        e.preventDefault();
        jump();
    }
});
document.getElementById('game-container').addEventListener('touchstart', e => {
    e.preventDefault();
    jump();
}, {passive: false});

// Para PC: clic en el contenedor también salta
document.getElementById('game-container').addEventListener('mousedown', e => {
    jump();
});

// Abrir relicario
function openRelic() {
    document.getElementById('relic-scene').classList.add('open');
}

// Juego Loop
function gameLoop(){
    if(gameOver) return;

    gctx.clearRect(0,0,gameCanvas.width,gameCanvas.height);
    
    // Piso
    gctx.fillStyle='#333';
    gctx.fillRect(0,gameCanvas.height-5,gameCanvas.width,5);

    // Focas
    [focaYellow,focaBrown].forEach(f=>{
        f.vy+=0.4; // gravedad
        f.y+=f.vy;
        if(f.y>=gameCanvas.height-32){f.y=gameCanvas.height-32;f.vy=0;f.jumping=false;}
        gctx.fillStyle=f.color;
        gctx.fillRect(f.x,f.y,f.width,f.height);
    });

    // Obstáculos
    if(Math.random()<0.015 && (obstacles.length === 0 || obstacles[obstacles.length-1].x < gameCanvas.width - 150)) {
        obstacles.push({x:gameCanvas.width,y:gameCanvas.height-32,width:20,height:32});
    }

    for(let i=obstacles.length-1;i>=0;i--){
        let obs = obstacles[i];
        obs.x-=4;
        gctx.fillStyle='#1e90ff';
        gctx.fillRect(obs.x,obs.y,obs.width,obs.height);

        // Colisión AABB Corregida
        [focaYellow,focaBrown].forEach(f=>{
            if (f.x < obs.x + obs.width &&
                f.x + f.width > obs.x &&
                f.y < obs.y + obs.height &&
                f.y + f.height > obs.y) {
                gameOver=true;
                alert("¡Pega en la pantalla o presiona espacio para reiniciar!");
                resetGame();
            }
        });

        if(obs.x+obs.width<0) obstacles.splice(i,1);
    }

    // Score
    if(!gameOver){score+=0.2;}
    document.getElementById('score').innerText=Math.floor(score);

    if(score>=100){
        document.getElementById('game-container').style.display='none';
        document.getElementById('relic-scene').style.display='block';
        setTimeout(() => { openRelic(); }, 100);
        return;
    }

    if(!gameOver) requestAnimationFrame(gameLoop);
}

function resetGame() {
    score = 0;
    obstacles = [];
    gameOver = false;
    focaYellow.y = gameCanvas.height-32; focaYellow.vy = 0; focaYellow.jumping = false;
    focaBrown.y = gameCanvas.height-32; focaBrown.vy = 0; focaBrown.jumping = false;
    gameLoop();
}
</script>
</body>
</html>
