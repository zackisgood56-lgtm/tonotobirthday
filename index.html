<style>
:root {
    --bg-color: #020205;
    --cobalt-primary: #0047AB;
    --cobalt-glow: #1e90ff;
    --relic-metal: #121218;
    --relic-accent: #1e2a3a;
    --text-main: #f0f0f5;
    --text-accent: #d1c7bd;
    --gold-light: #f5e0ac;
    --transition-speed: 0.8s;
    --font-display: 'Playfair Display', serif;
    --font-ui: 'Space Grotesk', sans-serif;
}

/* --- General --- */
* { box-sizing: border-box; margin:0; padding:0; cursor:none; }
body { background-color: var(--bg-color); color: var(--text-main); font-family: var(--font-ui); height:100vh; overflow:hidden; display:flex; justify-content:center; align-items:center; perspective:2000px; }

/* --- Cursor Personalizado --- */
#custom-cursor { width:20px; height:20px; border:2px solid var(--cobalt-glow); border-radius:50%; position:fixed; pointer-events:none; z-index:1000; transform:translate(-50%,-50%); transition:0.2s; mix-blend-mode:difference; }

/* --- Canvas de Fondo Partículas --- */
#bg-canvas { position:absolute; top:0; left:0; width:100%; height:100%; z-index:0; pointer-events:none; }

/* --- Controles de Música --- */
#music-btn {
    position: fixed; top:25px; right:25px; z-index:100;
    background: rgba(0,71,171,0.2); backdrop-filter:blur(8px);
    border:1px solid var(--cobalt-glow); padding:12px 24px;
    border-radius:30px; font-family:var(--font-ui);
    color:white; font-size:0.9rem; text-transform:uppercase;
    letter-spacing:1px; display:flex; align-items:center; gap:10px;
    box-shadow:0 5px 20px rgba(0,112,255,0.15);
    transition: all 0.3s;
}
#music-btn:hover { background: rgba(0,112,255,0.4); box-shadow:0 10px 30px rgba(0,112,255,0.3); }

/* --- Mini-juego contenedor --- */
#game-container {
    position: relative; width: 800px; height: 200px; background: linear-gradient(#020205,#0a0a10);
    overflow:hidden; border:2px solid var(--cobalt-primary); border-radius:12px;
    display:flex; justify-content:flex-start; align-items:flex-end; z-index:5;
}

/* --- Focas Pixel Art --- */
.foca {
    width:32px; height:32px; position:absolute; bottom:0; image-rendering: pixelated;
}
#foca-yellow { left:50px; background:url('data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAACAAAAAgCAYAAABzenr0AAABFUlEQVRYR+2WMQ6AIAxEJ+d/8XE/wl6I0kNzRzM5H5WjAKv+Nhl04WSCCCGEEEIIIYQQQgjE8zfK3WmP1Xg4iQka6kA0QEAgg4yPQWhIlM9L7aIM7iT3P7mF9+GxohLQruUfgd0cI5K0oIo3kC9pB6RcZ8IPhlkiTJk9rH6IH0sL3+8P4SrgzYdoYbB+0eLyHgHxX6BX3BAEQQgghhBBCCCGEEEIIIYQQ0j8QFAd9f6w6OKiMAAAAAElFTkSuQmCC') no-repeat center/contain;}
#foca-brown { left:100px; background:url('data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAACAAAAAgCAYAAABzenr0AAABF0lEQVRYR+2WMQ6AIAxEJ+d/8XG4RkFhQN/koeQmtghcB7P4p44QjCSEEEIIIYQQQgjkfhzZ6H3r5gf+qjqJHyXKAPBBDCCCEEEIIIYQQQgjh0+Od93y6HixpKx7bEQAggghhBBCCCGEEEII4X/EOA5vAMppR1nJQwAAAABJRU5ErkJggg==') no-repeat center/contain;}

/* --- Obstáculos --- */
.obstacle {
    width:32px; height:32px; position:absolute; bottom:0; background:#1e90ff; border:1px solid white; }

/* --- Relicario Digital --- */
#relic-scene { width:450px; height:350px; position:relative; transform-style: preserve-3d; transition:transform var(--transition-speed); z-index:10; display:none; }
#relic-scene.open { transform: rotateX(10deg) translateY(50px) scale(1.05); display:block; }
.relic-wrapper { width:100%; height:100%; position:absolute; transform-style: preserve-3d; transform-origin:center; animation: slowSpin 30s linear infinite; }
.relic-front { width:100%; height:100%; position:absolute; background-color: var(--relic-metal); border-radius:12px; box-shadow:0 30px 90px rgba(0,0,0,0.9); display:flex; overflow:hidden; z-index:5; }
.relic-door { width:50%; height:100%; position:absolute; top:0; background-color: var(--relic-accent); border:1px solid rgba(255,255,255,0.05); transform-style: preserve-3d; transition:transform var(--transition-speed) cubic-bezier(0.6,-0.28,0.735,0.045), z-index var(--transition-speed);}
.relic-door.left { left:0; border-radius:12px 0 0 12px; transform-origin:right; border-right:2px solid var(--cobalt-primary);}
.relic-door.right { right:0; border-radius:0 12px 12px 0; transform-origin:left; border-left:2px solid var(--cobalt-primary);}
#relic-scene.open .relic-door.left { transform: rotateY(-110deg) translateX(-10px); z-index:1; }
#relic-scene.open .relic-door.right { transform: rotateY(110deg) translateX(10px); z-index:1; }
.symbol-overlay { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%) translateZ(20px); font-size:3rem; color: var(--gold-light); text-shadow:0 0 15px var(--gold-light),0 0 30px var(--cobalt-glow); z-index:10; pointer-events:none; transition:opacity 0.5s; }
#relic-scene.open .symbol-overlay { opacity:0; }
.relic-back { width:100%; height:100%; position:absolute; top:0; left:0; background-color:var(--bg-color); border-radius:12px; border:2px solid var(--cobalt-primary); box-shadow:inset 0 0 50px rgba(0,112,255,0.15); z-index:1; padding:40px; transform:translateZ(-10px); overflow-y:auto; opacity:0; transition:opacity 0.5s var(--transition-speed);}
#relic-scene.open .relic-back { opacity:1; }
.relic-content { font-family:var(--font-display); font-size:1.15rem; line-height:1.9; color:var(--text-accent); text-align:justify; opacity:0; transform:translateY(20px); transition:opacity 1s 1s, transform 1s 1s; }
#relic-scene.open .relic-content { opacity:1; transform:translateY(0); }
.relic-content p { margin-bottom:20px; opacity:0; animation: fadeInText 1s forwards; }
